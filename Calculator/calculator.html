<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="calc">
    <div class="title">Calculator</div>

    <div class="grid">
        <!--Display-->
        <input id="result" type="text" placeholder="Result" readonly>
        <button class="btn op" onclick="setScreenvalue('+')">+</button>

        <!--Row 1-->
        <button class="btn" onlick="setScreenValue('1')">1</button>
        <button class="btn" onlick="setScreenValue('2')">2</button>
        <button class="btn" oclick="setScreenValue('3')">3</button>
        <button class="btn op" onclick="setScreenValue('-')">-</button>

        <!--Row 2-->
        <button class="btn" onlick="setScreenValue('4')">4</button>
        <button class="btn" onlick="setScreenValue('5')">5</button>
        <button class="btn" oclick="setScreenValue('6')">6</button>
        <button class="btn op" onclick="setScreenValue('*')">x</button>
         
        <!--Row 3-->
        <button class="btn" onlick="setScreenValue('7')">7</button>
        <button class="btn" onlick="setScreenValue('8')">8</button>
        <button class="btn" oclick="setScreenValue('9')">9</button>
        <button class="btn op" onclick="setScreenValue('/')">/</button>

        <!--Row 4-->
        <button class="btn" onlick="setScreenValue('%')">%</button>
        <button class="btn" onlick="setScreenValue('0')">0</button>
        <button class="btn" oclick="setScreenValue('.')">.</button>
        <button class="btn op" onclick="setScreenValue()">=</button>
    </div>

    <button class="clear" onclick="clearScreen()">CLEAR</button>

 </div>

 <script src="script.js"></script>

    
</body>
</html>
